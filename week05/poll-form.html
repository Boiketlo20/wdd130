<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WDD130 | HTML Form - User Poll </title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles/poll-form.css">
    </head>
    <body>
        <header>
            <h1>WDD130 | Boiketlo Nzimande | HTML Form - User Poll</h1>
        </header>
        <main>
             <form>
                <fieldset>
                    <legend>Contact Information</legend>
                    <div class="form=item column2">
                        <label for="fullname"> Full name:</label><br>
                        <input type="text" id="fullname" name="fullname"><br>      
                    </div>
                    <div class="form-item column2">
                        <label for="useremail"> E-mail address:</label><br>
                        <input type="email" id="useremail" name="useremial"><br>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Questions</legend>
                    <div class="form-item column1">
                        <label for="browser">What is your favorite browser?</label><br>
                        <select id="browser" name="browser">
                            <option value="google">Chrome</option>
                            <option value="safari">Safari</option>
                            <option value="bing">Bing</option>
                        </select>
                    </div>
                    <div class="form-item column1">
                        <label for="pet">Do you have a household pet?</label><br>
                        <input type="checkbox" id="pet" name="pet">
                    </div>
                    <label for="feedback">List the places you have lived:</label><br>
                    <textarea name="feedback" rows="4" placeholder="Sasolburg, Kwamashu" ></textarea>
                </fieldset>
                <button type="button">Submit Poll</button>
            </form>
        </main>
        <footer>
            <p>©2025 | HTML Form - User Poll Activity | Boiketlo Nzimande</p>
        </footer>
    </body>
</html>
